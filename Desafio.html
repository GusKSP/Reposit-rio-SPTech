<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio230326</title>
</head>

<body>
    <h1>Invasão de Impel Down</h1>
    <input type="number" name="Quantidade de batalhas" id="ipt_qtdBatalhas" placeholder="Batalhas"><br>
    <input type="number" name="Quantidade de marinheiros em cada batalha" id="ipt_qtdMarinheiros"
        placeholder="Marinheiros"><br>
    <input type="number" name="Quantidade de carnes disponíveis" id="ipt_qtdCarnes" placeholder="Carnes"><br>
    <button onclick="Batalhar()">Batalhar</button>
    <div>
        <p id="id_resultado"></p>
    </div>

</body>

</html>

<script>
    /*
    Comandos: 

    A cada batalha iniciada, deve aparecer valores de: 
    ----------------------------------------

    1° Batalha Iniciada:
    Quantidade de Energia Inicial: 100

    Resultado: Luffy saiu vitorioso, derrotando 30 marinheiro(s)
    ⚡ Energia Restante no Final da Batalha: 50
    🥩 Carnes Restantes no Final da Batalha: 0

    ----------------------------------------

    2° Batalha Iniciada:
    Quantidade de Energia Inicial: 40

    Resultado: Luffy foi derrotado, derrotando 8 marinheiro(s)
    ⚡ Energia Restante no Final da Batalha: 0
    🥩 Carnes Restantes no Final da Batalha: 0

    ----------------------------------------
 
    🛞 Não é possível iniciar a 3º batalha, acabou a carne e a energia.

    ----------------------------------------
 
    🛞 Não é possível iniciar a 4º batalha, acabou a carne e a energia.
    */
    function Batalhar() {
        let Energia = 100
        let Carnes = Number(ipt_qtdCarnes.value);
        let Derrotados = 0;
        const Marinheiros = Number(ipt_qtdMarinheiros.value);
        let Energia_inicial = 100;
        let Carnes_Iniciais = Number(ipt_qtdCarnes.value);

        let Resultado = true;  //Valor booleano, retornando resultados de vitorioso = true ou perdedor = false

        const Batalhas = Number(ipt_qtdBatalhas.value);
        const EnergiaNecessaria = (Marinheiros * 5);

        let Marinheiros_totais = Marinheiros * Batalhas;
        id_resultado.innerHTML = `----------------------------------------<br><br>
        Quantidade de batalhas: ${Batalhas}<br>
        Quantidade de marinheiros: ${Marinheiros}<br>
        Quantidade de carnes: ${Carnes}<br><br>`;

        console.log('Antes do for');

        if (Carnes < 0 || Marinheiros < 0 || Marinheiros < 0) {
            console.log('Valores inválidos')
        }

        else {
            for (let Luta = 0; Luta < Batalhas; Luta++) {
                console.log(Resultado);
                Energia_inicial = Energia
                if (Luta >= 1) {
                    Energia = Energia - 10
                }

                //Verificando se Luffy está sendo vitorioso ou Não
                if (Resultado == false) {
                    id_resultado.innerHTML += `----------------------------------------
                    <br><br>🛞 Não é possível iniciar a ${Luta + 1}º batalha, acabou a carne e a energia.<br><br>`
                }
                else if (Resultado == true) {
                    console.log('Verificando se a quantidade de energia atual é necessária para derrotar todos os marinheiros')
                    if (Energia >= EnergiaNecessaria) {
                        //No caso de Energia necessária, precisa apenas subtrair a quantidade de marinheiros do total, subtrair também a energia necessária da total e indicar a vitória nessa batalha!
                        Marinheiros_totais = Marinheiros_totais - Marinheiros;
                        Energia = Energia - EnergiaNecessaria;
                        Resultado = true;
                        console.log('Energia Necessária\nEnergia final!: ' + Energia);
                    }
                    else if (Energia > 0) {
                        //No caso de Energia ainda não necessária, é necessário comer uma carne para atingir a energia necessária!
                        console.log('Energia ainda não é necessária');
                        if (Carnes >= 1) {
                            //Caso tenha carnes disponíveis, é necessário "comê-la" e a energia será restaurada em 100
                            console.log('Comendo carne');
                            Carnes--
                            Energia = Energia + 100
                            //Agora deve fazer a verificação novamente!
                            if (Energia >= EnergiaNecessaria) {
                                //Retirando Energia total
                                Energia = Energia - EnergiaNecessaria;
                                Marinheiros_totais = Marinheiros_totais - Marinheiros;
                                Resultado = true;
                                console.log('Energia Necessária\nEnergia final!: ' + Energia);
                            }
                            //Agora a energia é impossível de ser menor que zero!
                            else {
                                Energia = Energia - EnergiaNecessaria;
                                console.log('Energia NÃO é necessária');
                                Derrotados = Energia / 5
                                console.log('Marinheiros derrotados: ' + Derrotados);
                                //Caso a quantidade de energia, dessa vez, não for suficiente, a derrota é certa!
                            }
                        }
                        else {
                            //Caso não tenham carnes disponível, a energia não será restaurada, porém ainda podem conter marinheiros derrotados

                            //A quantidade de marinheiros derrotados é diretamente proporcinal a quantidade de Energia disponível

                            Derrotados = Energia / 5;

                            //No caso de 4 batalhas, 30 marinheiros e 1 carne disponível, a quantidade de marinheiros derrotados na primeira batalha será de 30 e na segunda, apenas 8

                            console.log('Marinheiros derrotados: ' + Derrotados);

                            //Porém a derrota é certa!

                            Resultado = false;
                            Energia = Energia - EnergiaNecessaria;

                        }
                    }
                    else {
                        //No caso de energia menor que zero, é necessário comer uma  carne
                        console.log('Energia menor que zero!');
                        console.log('Comendo carne');
                        Carnes--
                        Energia = Energia + 100
                        //Agora deve fazer a verificação novamente!
                        if (Energia >= EnergiaNecessaria) {
                            Marinheiros_totais = Marinheiros_totais - Marinheiros;
                            Energia = Energia - EnergiaNecessaria;
                            Resultado = true;
                            console.log('Energia Necessária\nEnergia final!: ' + Energia);
                        }
                        //Agora a energia é impossível de ser menor que zero!
                        else {
                            console.log('Energia NÃO é necessária');
                            Derrotados = Energia / 5
                            console.log('Marinheiros derrotados: ' + Derrotados);
                            Resultado = false;
                            //Caso a quantidade de energia, dessa vez, não for suficiente, a derrota é certa!
                        }
                    }
                    if (Resultado == false) {
                        if (Energia < 0) {
                            Energia = 0
                        }
                        id_resultado.innerHTML += `----------------------------------------<br><br>

                        ${Luta + 1}° Batalha Iniciada:<br>
                        Quantidade de Energia Inicial: ${Energia_inicial}<br><br>

                        Resultado: Luffy foi derrotado, derrotando ${Derrotados} marinheiro(s)<br>
                        ⚡ Energia Restante no Final da Batalha: ${Energia}<br>
                        🥩 Carnes Restantes no Final da Batalha: ${Carnes}<br><br>`
                    }
                    else if (Resultado == true) {
                        id_resultado.innerHTML += `----------------------------------------<br><br>

                        ${Luta + 1}° Batalha Iniciada:<br>
                        Quantidade de Energia Inicial: ${Energia_inicial}<br><br>

                        Resultado: Luffy saiu vitorioso, derrotando ${Marinheiros} marinheiro(s)<br>
                        ⚡ Energia Restante no Final da Batalha: ${Energia}<br>
                        🥩 Carnes Restantes no Final da Batalha: ${Carnes}<br><br>`
                    }
                }
            }
        }
    }
</script>
